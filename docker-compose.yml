version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: fracex-mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}) }" | mongosh --quiet
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fracex-redis
    ports:
      - "6379:6379"

  server:
    build: ./server
    container_name: fracex-server
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/fracex?replicaSet=rs0
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: ./worker
    container_name: fracex-worker
    environment:
      MONGO_URI: mongodb://mongo:27017/fracex?replicaSet=rs0
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  mongo-data: